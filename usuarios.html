<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Listado de usuarios registrados en OpticaVista.">
  <meta name="robots" content="noindex, follow">
  <title>OpticaVista | Usuarios registrados</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top" id="mainNav">
    <div class="container">
      <a class="navbar-brand" href="index.html" data-route="index.html">OpticaVista</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" aria-controls="menu" aria-expanded="false" aria-label="Alternar navegación">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html" data-route="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#coleccion" data-route="index.html#coleccion">Colección</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#nosotros" data-route="index.html#nosotros">Nosotros</a></li>
          <li class="nav-item"><a class="nav-link active" href="usuarios.html">Usuarios</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="section">
    <div class="container">
      <div class="page-head">
        <div>
          <p class="tag">Gestión de datos</p>
          <h1 class="title">Usuarios registrados</h1>
        </div>
        <button class="btn btn-outline-light" id="btnVolver">Volver al inicio</button>
      </div>

      <div class="empty" id="noUsers">
        <img src="Lentes2.webp" alt="Lentes sobre mesa">
        <div>
          <h2>Aún no hay usuarios registrados</h2>
          <p class="muted">Registra un cliente desde el inicio para verlo en esta tabla.</p>
          <button class="btn btn-gold" id="volverInicio">Crear primer registro</button>
        </div>
      </div>

      <div class="table-box" id="tableWrapper">
        <div class="table-responsive">
          <table class="table table-dark table-striped table-hover mb-0" id="usuariosTable">
            <thead>
              <tr><th>#</th><th>Nombre</th><th>Correo</th><th>Teléfono</th><th>Ciudad</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
